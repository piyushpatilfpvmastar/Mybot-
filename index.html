<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentHub — Short & Crisp Debate</title>
<style>
  :root { --bg: #0a0a0f; --card: #16161f; --accent: #7c3aed; --text: #e2e8f0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; padding-bottom: 100px; }
  /* नवीन क्लीन UI डिझाइन */
  .post-card { background: var(--card); border-left: 4px solid var(--accent); border-radius: 8px; margin: 15px; padding: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
  .agent-name { color: var(--accent); font-weight: 700; font-size: 0.85rem; margin-bottom: 5px; }
  .short-text { font-size: 0.8rem; line-height: 1.5; color: #cbd5e1; }
  .bottom { position: fixed; bottom: 0; width: 100%; background: #111118; padding: 15px; border-top: 1px solid #1e1e2e; }
  .sbtn { width: 100%; background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; }
</style>
</head>
<body>

<header style="padding:15px; font-weight:bold; color:var(--accent);">🤖 AgentHub — Arena</header>
<div id="postsFeed"></div>

<div class="bottom">
  <input class="kinput" id="apiKey" type="password" style="width:100%; padding:10px; margin-bottom:10px; background:#0a0a0f; border:1px solid #1e1e2e; color:white; border-radius:8px;" placeholder="Groq API Key (gsk_...)"/>
  <button class="sbtn" onclick="startNet()">Start Short Debate</button>
  <div id="sts" style="font-size:0.7rem; text-align:center; margin-top:8px; color:var(--accent);"></div>
</div>

<script>
const AGENTS = [{name:'Sunil'}, {name:'Ajay'}, {name:'Piyush'}, {name:'Sana'}];
let isRunning = false, groqKey = '';

async function callGroq(prompt) {
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+groqKey },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      // इथेच आपण 'short' आणि 'crisp' उत्तर मिळवण्यासाठी प्रॉम्प्ट दिला आहे
      messages: [{ role: 'user', content: prompt + " (कृपया उत्तर खूप संक्षिप्त म्हणजे फक्त 2-3 ओळींत आणि मुद्द्यात द्या. लांबलचक मजकूर नको.)" }]
    })
  });
  const d = await r.json();
  return d.choices?.[0]?.message?.content || 'त्रुटी';
}

async function cycle() {
  if(!isRunning) return;
  const a1 = AGENTS[Math.floor(Math.random()*AGENTS.length)];
  const a2 = AGENTS[Math.floor(Math.random()*AGENTS.length)];
  
  document.getElementById('sts').textContent = a1.name + " vs " + a2.name + " (Short Debate)...";
  
  // डिबेट अजून छोटी करण्यासाठी विषय
  const q = await callGroq("तू " + a1.name + " आहेस. 'डिजिटल नैतिकता' यावर एक छोटा आणि तडाखेबंद प्रश्न विचार.");
  const a = await callGroq("तू " + a2.name + " आहेस. वरील प्रश्नाचे एक छोटे आणि मुद्देसूद उत्तर दे: " + q);
  
  const feed = document.getElementById('postsFeed');
  feed.innerHTML = `
    <div class="post-card">
      <div class="agent-name">${a1.name}:</div>
      <div class="short-text">${q}</div>
      <br>
      <div class="agent-name" style="color:var(--accent);">${a2.name}:</div>
      <div class="short-text">${a}</div>
    </div>` + feed.innerHTML;
  
  setTimeout(cycle, 10000);
}

function startNet() {
  groqKey = document.getElementById('apiKey').value;
  if(!groqKey) return alert('API Key टाक!');
  isRunning = true;
  cycle();
}
</script>
</body>
</html>
