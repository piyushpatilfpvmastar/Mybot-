<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentHub — AI Debate Arena</title>
<style>
  :root { --bg: #0a0a0f; --card: #16161f; --accent: #7c3aed; --text: #e2e8f0; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; padding-bottom: 80px; }
  .post-card { background: var(--card); border-left: 4px solid var(--accent); border-radius: 8px; margin: 15px; padding: 16px; }
  .agent-name { color: var(--accent); font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; border-bottom: 1px solid #2d2d3a; padding-bottom: 4px; }
  .short-text { font-size: 0.85rem; line-height: 1.6; color: #d1d5db; white-space: pre-line; }
  .bottom { position: fixed; bottom: 0; width: 100%; background: #111118; padding: 15px; border-top: 1px solid #2d2d3a; text-align: center; }
</style>
</head>
<body>

<header style="padding:15px; font-weight:bold; color:var(--accent);">🤖 AgentHub — AI Arena</header>
<div id="postsFeed"></div>

<div class="bottom">
  <div style="font-size: 0.7rem; color: #64748b;">System is running in live mode...</div>
</div>

<script>
// API Key इथे टाक (ही की सुरक्षित ठिकाणी ठेवा)
const MY_API_KEY = "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"; 
const AGENTS = [{name:'Sunil'}, {name:'Ajay'}];

async function callGroq(prompt) {
  const r = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer '+MY_API_KEY },
    body: JSON.stringify({
      model: 'llama-3.1-8b-instant',
      messages: [{ role: 'user', content: prompt + " (कृपया उत्तर फक्त ३-४ मुद्द्यांत (Bullet points) आणि अत्यंत संक्षिप्त मराठी भाषेत द्या. लांबलचक मजकूर नको.)" }]
    })
  });
  const d = await r.json();
  return d.choices?.[0]?.message?.content || 'त्रुटी';
}

async function startAuto() {
  while(true) {
    const a1 = AGENTS[0], a2 = AGENTS[1];
    
    // AI फक्त मराठीत बोलेल
    const q = await callGroq("तू " + a1.name + " आहेस. 'डिजिटल नैतिकता' यावर बाजूने ३ छोटे मुद्दे मराठीत मांड.");
    const a = await callGroq("तू " + a2.name + " आहेस. या विषयावर विरोधात ३ छोटे मुद्दे मराठीत मांड: " + q);
    
    const feed = document.getElementById('postsFeed');
    feed.innerHTML = `
      <div class="post-card">
        <div class="agent-name">🔥 ${a1.name} (Pro):</div>
        <div class="short-text">${q}</div>
        <br>
        <div class="agent-name" style="color:var(--accent);">⚠️ ${a2.name} (Anti):</div>
        <div class="short-text">${a}</div>
      </div>` + feed.innerHTML;
      
    await new Promise(r => setTimeout(r, 15000));
  }
}

window.onload = startAuto;
</script>
</body>
</html>
